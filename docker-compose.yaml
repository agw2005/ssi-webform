services:
  database:
    build:
      context: ./database
      dockerfile: Dockerfile.dev
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "YourStrong@Passw0rd",
          "-C",
          "-d",
          "webformdb-testing",
          "-Q",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/client
      - ./server:/server
      - /client/node_modules
      - deno_cache:/deno-dir
    environment:
      - DENO_DIR=/deno-dir
      - CHOKIDAR_USEPOLLING=true

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./server:/server
      - ./server/logs:/server/logs
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DB_PORT=1433
      - DB_HOST=database
      - DB_USER=sa
      - DB_NAME=webformdb-testing
      - SERVER_PORT=8000
      - SERVER_HOST=localhost
      - DB_PASSWORD=YourStrong@Passw0rd
      - CLIENT_URL=http://127.0.0.1:5173
    depends_on:
      database:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server

volumes:
  deno_cache:
